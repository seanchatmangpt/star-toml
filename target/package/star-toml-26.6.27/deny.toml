# cargo-deny configuration (schema v2; targets cargo-deny >= 0.16).
# Run locally with `cargo deny check` or `just deny`; enforced in CI.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
# RustSec advisory DB — local cache and upstream URL.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# In schema v2, vulnerability is always denied; these make the policy explicit.
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
version = 2
# House policy: permissive licenses only. Copyleft (GPL/AGPL/LGPL) is denied
# by omission so a transitive copyleft dep fails CI loudly.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
confidence-threshold = 0.9
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path deps within the house ecosystem are allowed to use wildcard versions.
allow-wildcard-paths = true
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/seanchatmangpt"]
