[package]
edition = "2021"
rust-version = "1.82"
name = "star-toml"
version = "26.6.27"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
build = false
exclude = [
    ".agents/",
    "PROJECT.md",
    "TEST_INFRA.md",
    "TEST_READY.md",
    "mcp_server.py",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Framework for loading, layering, and validating any *.toml configuration file"
homepage = "https://github.com/seanchatmangpt/star-toml"
readme = "README.md"
keywords = [
    "config",
    "toml",
    "layered",
    "validation",
]
categories = [
    "development-tools",
    "config",
]
license = "MIT"
repository = "https://github.com/seanchatmangpt/star-toml"

[features]
e2e_tests = []

[lib]
name = "star_toml"
path = "src/lib.rs"

[[example]]
name = "validate"
path = "examples/validate.rs"

[[test]]
name = "adversarial"
path = "tests/adversarial.rs"

[[test]]
name = "e2e_tests"
path = "tests/e2e_tests.rs"

[[test]]
name = "validation_macros"
path = "tests/validation_macros.rs"

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.star-toml-derive]
version = "26.6.27"

[dependencies.thiserror]
version = "2.0"

[dependencies.toml]
version = "1.1.0"
features = ["preserve_order"]

[dev-dependencies.serde]
version = "1.0"
features = ["derive"]

[dev-dependencies.tempfile]
version = "3"

[lints.clippy]
dbg_macro = "deny"
expect_used = "warn"
todo = "deny"
unimplemented = "deny"
unwrap_used = "warn"

[lints.clippy.all]
level = "warn"
priority = -1

[lints.clippy.pedantic]
level = "warn"
priority = -1

[lints.rust]
missing_docs = "warn"
unexpected_cfgs = "warn"
unreachable_pub = "warn"
unsafe_code = "forbid"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
